# Builds, signs and uploads bootiful-sqltemplate to the Maven Central Portal
# when a release tag (e.g. 4.0.0) is pushed. Use release.sh to cut a release;
# it bumps the version and pushes the tag that triggers this workflow.
#
# This workflow only deploys — it never writes back to the repository
# (permissions: contents: read). autoPublish is false in the release profile,
# so after the upload you must publish the deployment manually in the Portal UI
# at https://central.sonatype.com.
#
# Required repository secrets (Settings > Secrets and variables > Actions):
#   CENTRAL_USERNAME / CENTRAL_PASSWORD - Central Portal user token (the
#                                         username/password pair shown on token generation)
#   GPG_PRIVATE_KEY / GPG_PASSPHRASE    - GPG key used to sign the artifacts
name: Publish release
on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
permissions:
  contents: read
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 17 and Central Portal credentials
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Build, sign and upload to the Central Portal
        run: ./mvnw --batch-mode --no-transfer-progress -Prelease --projects bootiful-sqltemplate clean deploy
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
