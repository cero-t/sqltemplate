# DISABLED (pending Phase 6 / Central Portal migration).
# OSSRH (oss.sonatype.org) reached end-of-life on 2025-06-30, so the deploy
# flow below no longer works. The trigger has been switched to manual-only
# (workflow_dispatch) so it never fires automatically. This file will be
# rewritten for the Central Portal (central-publishing-maven-plugin) in Phase 6.
name: Publish snapshot
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Maven Central Repository
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
      - name: Publish snapshot
        run: mvn deploy --batch-mode --also-make --projects bootiful-sqltemplate
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
